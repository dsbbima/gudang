<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login User</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #00897b; --secondary-color: #ffb300; --background-color: #f0f4f8; --card-background: #ffffff; --text-color: #343a40; }
        body { font-family: 'Poppins', sans-serif; background: var(--background-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-container { width: 100%; max-width: 400px; background: var(--card-background); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: var(--primary-color); font-size: 1.8rem; margin-bottom: 5px; }
        .tagline { color: var(--secondary-color); font-size: 0.9rem; margin-bottom: 25px; }
        .input-group { text-align: left; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--primary-color); }
        input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; text-transform: uppercase; }
        .btn-masuk { width: 100%; padding: 14px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-masuk:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>DEPO SUMBER BANGUNAN</h1>
        <p class="tagline">Aplikasi Pencatatan Inventory</p>
        <form id="loginForm">
            <div class="input-group">
                <label>Nama User</label>
                <input type="text" id="userName" placeholder="MASUKKAN NAMA" required>
            </div>
            <button type="submit" class="btn-masuk" id="masukButton">MASUK 🚀</button>
        </form>
    </div>

    <script>
        // MASUKKAN URL WEB APP ANDA DI SINI
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwJ_uCzzwazBE5PGOrXPy4HddMvjxPNELVBkvLa-5366da9q8Jhlgz19tUQtBYh68-C/exec'; 

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('masukButton');
            const name = document.getElementById('userName').value.trim().toUpperCase();
            
            btn.disabled = true;
            btn.textContent = 'MEMVALIDASI...';

            try {
                // Gunakan mode cors dan bersihkan URL
                const response = await fetch(`${SCRIPT_URL}?action=validateUser&userName=${encodeURIComponent(name)}`);
                const result = await response.json();

                if (result.status === 'success') {
                    localStorage.setItem('activeUser', name);
                    window.location.href = 'pilih_transaksi.html';
                } else {
                    alert('❌ Nama tidak terdaftar!');
                }
            } catch (err) {
                alert('❌ Koneksi Gagal atau URL Script Salah!');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.textContent = 'MASUK 🚀';
            }
        });
    </script>
</body>
</html>
